<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المزرعة الذكية - الأستاذ أحمد باشا</title>
    <meta name="theme-color" content="#10B981">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',Tahoma,sans-serif;background:#1E293B;color:#F8FAFC;min-height:100vh}
        .loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px;text-align:center}
        .loading-spinner{width:60px;height:60px;border:4px solid #334155;border-top-color:#10B981;border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:20px}
        @keyframes spin{to{transform:rotate(360deg)}}
        .header{background:linear-gradient(135deg,#10B981,#059669);padding:24px;text-align:center;color:#fff}
        .header h1{font-size:24px;margin-bottom:6px}
        .header .status{font-size:12px;opacity:0.8;margin-top:8px}
        nav{display:flex;background:#0F172A;position:sticky;top:0;z-index:10;overflow-x:auto}
        nav a{flex:1;min-width:65px;padding:14px 8px;text-align:center;color:#94A3B8;font-size:11px;text-decoration:none;border-bottom:3px solid transparent}
        nav a.active{color:#10B981;border-bottom-color:#10B981}
        nav a span{display:block;font-size:20px;margin-bottom:4px}
        main{padding:16px;padding-bottom:80px}
        .card{background:#0F172A;border-radius:14px;padding:18px;margin-bottom:12px;border:1px solid #1E293B}
        .card h2{font-size:17px;margin-bottom:12px}
        .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
        .grid4{display:grid;grid-template-columns:1fr 1fr;gap:10px}
        @media(min-width:600px){.grid4{grid-template-columns:repeat(4,1fr)}}
        .stat{background:#1E293B;border-radius:10px;padding:14px;text-align:center}
        .stat .val{font-size:22px;font-weight:bold}
        .stat .lbl{font-size:10px;color:#94A3B8;margin-top:4px}
        button,.btn{padding:10px 18px;border:none;border-radius:8px;font-size:14px;font-weight:bold;cursor:pointer;color:#fff;margin:4px}
        .btn-green{background:#10B981}
        .btn-gold{background:#F59E0B;color:#000}
        .btn-red{background:#EF4444}
        .btn-outline{background:transparent;border:2px solid #10B981;color:#10B981}
        .btn-block{display:block;width:100%;padding:14px;margin:8px 0}
        .btn-sm{padding:6px 12px;font-size:12px}
        input,select,textarea{width:100%;padding:10px;background:#1E293B;border:1px solid #334155;border-radius:8px;color:#F8FAFC;font-size:14px;margin:4px 0;font-family:inherit}
        label{font-size:12px;color:#94A3B8;display:block;margin-top:8px}
        .tags{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0}
        .tag{padding:6px 14px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid #334155;background:#1E293B;color:#94A3B8}
        .tag.active{background:#10B981;color:#fff;border-color:#10B981}
        .chat-msg{padding:10px 14px;border-radius:16px;margin:8px 0;max-width:85%;font-size:14px;line-height:1.5}
        .chat-user{background:#10B981;color:#fff;margin-right:auto;border-bottom-left-radius:4px}
        .chat-bot{background:#1E293B;border:1px solid #334155;margin-left:auto;border-bottom-right-radius:4px}
        .progress{height:8px;background:#1E293B;border-radius:4px;margin:8px 0;overflow:hidden}
        .progress div{height:100%;background:#10B981;border-radius:4px;transition:width 0.3s}
        .hidden{display:none!important}
        .fab{position:fixed;bottom:20px;right:16px;width:56px;height:56px;border-radius:50%;background:#10B981;border:none;color:#fff;font-size:28px;cursor:pointer;box-shadow:0 4px 16px rgba(16,185,129,0.4);z-index:100}
        .modal{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
        .modal>div{background:#0F172A;border-radius:16px;padding:20px;width:100%;max-width:400px;max-height:80vh;overflow-y:auto}
    </style>
</head>
<body>
<div id="loadingScreen" class="loading-screen"><div class="loading-spinner"></div><h2 style="color:#F8FAFC;margin-bottom:8px">🌾 جاري تحميل المزرعة الذكية</h2><p style="color:#94A3B8;font-size:14px" id="loadingMsg">الاتصال بالمستودع...</p></div>
<div id="app" class="hidden"><div class="header"><h1>🌾 المزرعة الذكية</h1><p>للأستاذ أحمد باشا</p><p class="status" id="repoStatus"></p></div><nav id="nav"></nav><main id="main"></main><button class="fab hidden" id="fab" onclick="handleFab()">+</button></div>
<div class="modal hidden" id="modal"><div id="modalContent"></div></div>
<script>
var CONFIG={owner:'madnessgate44-debug',repo:'smart-farm',branch:'main'};
var DATA={lands:[],crops:[],tasks:[],workers:[],purchases:[],sales:[],treasury:[],meetings:[],animals:[],equipment:[],inventory:[]};
var currentPage='dashboard',currentTable='lands';
var chatHistory=[{text:'الأستاذ أحمد يا باشا، مرحب بيك! 🌾\nالنظام شغال وجاهز. قولي إيه اللي حصل النهارده في المزرعة؟',user:false}];
loadApp();
async function loadApp(){updateLoading('تحميل البيانات المحلية...');loadLocalData();updateLoading('الاتصال بـ GitHub...');try{await fetchRepoFiles();updateLoading('تم التحميل!');}catch(e){updateLoading('⚠️ وضع عدم الاتصال - استخدام البيانات المحلية');}finally{setTimeout(function(){document.getElementById('loadingScreen').classList.add('hidden');document.getElementById('app').classList.remove('hidden');document.getElementById('repoStatus').textContent='✅ متصل | '+CONFIG.owner+'/'+CONFIG.repo;renderNav();renderPage();},500)}}
function updateLoading(msg){document.getElementById('loadingMsg').textContent=msg}
async function fetchRepoFiles(){var url='https://api.github.com/repos/'+CONFIG.owner+'/'+CONFIG.repo+'/git/trees/'+CONFIG.branch+'?recursive=1';var resp=await fetch(url);if(!resp.ok)throw new Error('Failed');var data=await resp.json();console.log('Repo loaded:',data.tree.length,'files');return data.tree}
function loadLocalData(){var keys=['lands','crops','tasks','workers','purchases','sales','treasury','meetings','animals','equipment','inventory'];for(var i=0;i<keys.length;i++){var k=keys[i];var d=localStorage.getItem('sf_'+k);if(d){try{DATA[k]=JSON.parse(d)}catch(e){DATA[k]=[]}}}}
function saveData(key){localStorage.setItem('sf_'+key,JSON.stringify(DATA[key]))}
function renderNav(){var pages=[{id:'dashboard',icon:'🏠',label:'الرئيسية'},{id:'chat',icon:'💬',label:'بليغ'},{id:'tasks',icon:'📋',label:'المهام'},{id:'tables',icon:'📊',label:'الجداول'},{id:'finance',icon:'💰',label:'المالية'},{id:'workers',icon:'👷',label:'العمال'},{id:'inventory',icon:'📦',label:'المخازن'}];var nav=document.getElementById('nav');nav.innerHTML=pages.map(function(p){var active=currentPage===p.id?' active':'';return '<a href="#" class="nav-link'+active+'" data-page="'+p.id+'" onclick="navigate(\''+p.id+'\');return false"><span>'+p.icon+'</span>'+p.label+'</a>'}).join('')}
function navigate(page){currentPage=page;var links=document.querySelectorAll('.nav-link');for(var i=0;i<links.length;i++)links[i].classList.remove('active');var active=document.querySelector('[data-page="'+page+'"]');if(active)active.classList.add('active');renderPage()}
function renderPage(){var main=document.getElementById('main');var fab=document.getElementById('fab');fab.classList.add('hidden');switch(currentPage){case 'dashboard':main.innerHTML=renderDashboard();break;case 'chat':main.innerHTML=renderChat();break;case 'tasks':main.innerHTML=renderTasks();fab.classList.remove('hidden');break;case 'tables':main.innerHTML=renderTables();fab.classList.remove('hidden');break;case 'finance':main.innerHTML=renderFinance();break;case 'workers':main.innerHTML=renderWorkers();fab.classList.remove('hidden');break;case 'inventory':main.innerHTML=renderInventory();fab.classList.remove('hidden');break}}
function renderDashboard(){var revenue=DATA.sales.reduce(function(s,i){return s+(Number(i.totalRevenue)||0)},0);var expenses=DATA.purchases.reduce(function(s,i){return s+(Number(i.totalCost)||0)},0);var completed=DATA.tasks.filter(function(t){return t.status==='مكتمل'}).length;var net=revenue-expenses;return'<div class="card"><h2>📊 إحصائيات المزرعة</h2><div class="grid4"><div class="stat"><div class="val" style="color:#3B82F6">'+DATA.tasks.length+'</div><div class="lbl">المهام</div></div><div class="stat"><div class="val" style="color:#10B981">'+completed+'</div><div class="lbl">مكتملة</div></div><div class="stat"><div class="val" style="color:#F59E0B">'+DATA.workers.length+'</div><div class="lbl">عمال</div></div><div class="stat"><div class="val" style="color:#8B5CF6">'+DATA.lands.length+'</div><div class="lbl">أراضي</div></div></div></div><div class="card"><h2>💰 الملخص المالي</h2><div class="grid2"><div class="stat"><div class="val" style="color:#10B981">'+revenue.toLocaleString()+' ج</div><div class="lbl">الإيرادات</div></div><div class="stat"><div class="val" style="color:#EF4444">'+expenses.toLocaleString()+' ج</div><div class="lbl">المصروفات</div></div></div><div class="stat" style="margin-top:8px"><div class="val" style="color:'+(net>=0?'#10B981':'#EF4444')+'">'+net.toLocaleString()+' ج</div><div class="lbl">الصافي</div></div></div>'}
function renderChat(){return'<div style="display:flex;flex-direction:column;height:calc(100vh - 220px)"><div style="flex:1;overflow-y:auto;padding:8px" id="chatBox">'+chatHistory.map(function(m){return'<div class="chat-msg '+(m.user?'chat-user':'chat-bot')+'">'+m.text.replace(/\n/g,'<br>')+'</div>'}).join('')+'</div><div style="display:flex;gap:8px;padding:10px;background:#0F172A;border-radius:12px;margin-top:8px"><button onclick="startVoice()" style="background:#F59E0B;border:none;border-radius:50%;width:42px;height:42px;cursor:pointer;font-size:18px;flex-shrink:0">🎤</button><input id="chatInput" placeholder="اكتب رسالة..." style="flex:1" onkeypress="if(event.key==='Enter')sendChat()"><button onclick="sendChat()" style="background:#10B981;border:none;border-radius:8px;padding:8px 16px;color:#fff;cursor:pointer;flex-shrink:0">إرسال</button></div></div>'}
function sendChat(){var input=document.getElementById('chatInput');if(!input||!input.value.trim())return;chatHistory.push({text:input.value,user:true});input.value='';setTimeout(function(){var responses=['تمام يا باشا، تم التسجيل ✓','حاضر، هسجل البيانات فوراً 📝','أوكيه يا باشا، خلينا نشوف التفاصيل','ماشي يا باشا، تم. عايز حاجة تانية؟ 🌾'];chatHistory.push({text:responses[Math.floor(Math.random()*responses.length)],user:false});renderPage();var box=document.getElementById('chatBox');if(box)box.scrollTop=box.scrollHeight},800);renderPage();var box=document.getElementById('chatBox');if(box)box.scrollTop=box.scrollHeight}
function startVoice(){alert('🎙️ التسجيل الصوتي\n\nهذه الميزة تعمل عند تثبيت التطبيق على الهاتف')}
function renderTasks(){return'<div class="grid4"><div class="stat"><div class="val">'+DATA.tasks.length+'</div><div class="lbl">إجمالي</div></div><div class="stat"><div class="val">'+DATA.tasks.filter(function(t){return t.status==='مكتمل'}).length+'</div><div class="lbl">✅ مكتملة</div></div><div class="stat"><div class="val">'+DATA.tasks.filter(function(t){return t.status==='جاري العمل'}).length+'</div><div class="lbl">⚡ جاري</div></div><div class="stat"><div class="val">'+DATA.tasks.filter(function(t){return t.status==='قيد الانتظار'}).length+'</div><div class="lbl">⏳ انتظار</div></div></div>'+DATA.tasks.map(function(t,i){return'<div class="card"><div style="display:flex;justify-content:space-between;align-items:center"><strong>'+t.taskName+'</strong><span style="color:'+(t.status==='مكتمل'?'#10B981':t.status==='جاري العمل'?'#F59E0B':'#94A3B8')+'">'+t.status+'</span></div><div style="font-size:12px;color:#94A3B8;margin:6px 0">'+(t.workerName||'')+' • '+(t.cropName||'')+'</div><div class="progress"><div style="width:'+(t.progress||0)+'%"></div></div><div style="display:flex;gap:6px;margin-top:8px"><button class="btn-sm btn-green" onclick="updateTask('+i+',\'جاري العمل\',50)">بدء</button><button class="btn-sm btn-gold" onclick="updateTask('+i+',\'مكتمل\',100)">إكمال</button><button class="btn-sm btn-red" onclick="deleteTask('+i+')">🗑️</button></div></div>'}).join('')||'<div class="card"><p style="color:#94A3B8;text-align:center">لا توجد مهام بعد</p></div>'}
function updateTask(i,status,progress){DATA.tasks[i].status=status;DATA.tasks[i].progress=progress;saveData('tasks');renderPage()}
function deleteTask(i){DATA.tasks.splice(i,1);saveData('tasks');renderPage()}
function renderTables(){var tables=['lands','crops','workers','purchases','sales','treasury','animals','equipment'];var labels={lands:'أراضي',crops:'محاصيل',workers:'عمال',purchases:'مشتريات',sales:'مبيعات',treasury:'خزينة',animals:'حيوانات',equipment:'معدات'};return'<div class="tags">'+tables.map(function(t){return'<span class="tag'+(currentTable===t?' active':'')+'" onclick="switchTable(\''+t+'\')">'+labels[t]+'</span>'}).join('')+'</div><div id="tableContent">'+renderTableContent()+'</div>'}
function switchTable(table){currentTable=table;renderPage()}
function renderTableContent(){var data=DATA[currentTable]||[];if(data.length===0)return'<div class="card"><p style="color:#94A3B8;text-align:center">لا توجد بيانات</p></div>';return data.map(function(item,i){var keys=Object.keys(item).slice(0,5);return'<div class="card"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div>'+keys.map(function(k){return'<div style="font-size:13px;margin:2px 0"><span style="color:#94A3B8">'+k+':</span> '+item[k]+'</div>'}).join('')+'</div><button class="btn-sm btn-red" onclick="deleteItem(\''+currentTable+'\','+i+')">🗑️</button></div></div>'}).join('')}
function deleteItem(table,i){DATA[table].splice(i,1);saveData(table);renderPage()}
function handleFab(){if(currentPage==='tasks'){showModal('إضافة مهمة جديدة','<label>عنوان المهمة</label><input id="fTaskName"><label>اسم العامل</label><input id="fWorker"><label>المحصول</label><input id="fCrop"><button class="btn btn-green btn-block" onclick="addTask()">حفظ المهمة</button>')}else if(currentPage==='tables'){var fields={lands:'code,name,area',crops:'code,crop,season',workers:'code,name,job',purchases:'item,quantity,totalCost',sales:'item,quantity,totalRevenue',treasury:'amount,description'};var f=(fields[currentTable]||'name').split(',');showModal('إضافة إلى '+currentTable,f.map(function(x){return'<label>'+x+'</label><input id="f_'+x+'">'}).join('')+'<button class="btn btn-green btn-block" onclick="addTableItem()">حفظ</button>')}else if(currentPage==='workers'){showModal('إضافة عامل','<label>الاسم</label><input id="fName"><label>الوظيفة</label><input id="fJob"><label>الأجر اليومي</label><input id="fRate" type="number"><label>رقم الهاتف</label><input id="fPhone"><button class="btn btn-green btn-block" onclick="addWorker()">حفظ</button>')}else if(currentPage==='inventory'){showModal('إضافة للمخزن','<label>اسم الصنف</label><input id="fName"><label>الكمية</label><input id="fQty" type="number"><label>الوحدة</label><input id="fUnit" value="كجم"><button class="btn btn-green btn-block" onclick="addInventory()">حفظ</button>')}}
function addTask(){DATA.tasks.push({taskName:document.getElementById('fTaskName')?.value||'مهمة جديدة',workerName:document.getElementById('fWorker')?.value||'',cropName:document.getElementById('fCrop')?.value||'',status:'قيد الانتظار',progress:0,date:new Date().toISOString().split('T')[0]});saveData('tasks');closeModal();renderPage()}
function addTableItem(){var item={};var inputs=document.querySelectorAll('#modalContent input');for(var i=0;i<inputs.length;i++){var id=inputs[i].id.replace('f_','');item[id]=inputs[i].value}item.date=new Date().toISOString().split('T')[0];DATA[currentTable].push(item);saveData(currentTable);closeModal();renderPage()}
function addWorker(){DATA.workers.push({name:document.getElementById('fName')?.value||'',job:document.getElementById('fJob')?.value||'',dailyRate:document.getElementById('fRate')?.value||'0',phone:document.getElementById('fPhone')?.value||'',status:'نشط'});saveData('workers');closeModal();renderPage()}
function addInventory(){DATA.inventory.push({name:document.getElementById('fName')?.value||'',quantity:document.getElementById('fQty')?.value||'0',unit:document.getElementById('fUnit')?.value||'كجم'});saveData('inventory');closeModal();renderPage()}
function renderFinance(){var rev=DATA.sales.reduce(function(s,i){return s+(Number(i.totalRevenue)||0)},0);var exp=DATA.purchases.reduce(function(s,i){return s+(Number(i.totalCost)||0)},0);var net=rev-exp;return'<div class="grid2"><div class="stat"><div class="val" style="color:#10B981">'+rev.toLocaleString()+' ج</div><div class="lbl">إجمالي المبيعات</div></div><div class="stat"><div class="val" style="color:#EF4444">'+exp.toLocaleString()+' ج</div><div class="lbl">إجمالي المشتريات</div></div></div><div class="card"><h2>📈 صافي الربح</h2><div class="stat"><div class="val" style="font-size:28px;color:'+(net>=0?'#10B981':'#EF4444')+'">'+net.toLocaleString()+' ج</div></div></div><div class="card"><h2>📋 ملخص</h2><div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #1E293B"><span>عدد المبيعات</span><span>'+DATA.sales.length+'</span></div><div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #1E293B"><span>عدد المشتريات</span><span>'+DATA.purchases.length+'</span></div><div style="display:flex;justify-content:space-between;padding:8px 0"><span>معاملات الخزينة</span><span>'+DATA.treasury.length+'</span></div></div>'}
function renderWorkers(){return'<div class="stat" style="margin-bottom:12px"><div class="val">'+DATA.workers.length+'</div><div class="lbl">إجمالي العمال</div></div>'+DATA.workers.map(function(w,i){return'<div class="card"><div style="display:flex;justify-content:space-between"><div><strong>'+w.name+'</strong><div style="font-size:12px;color:#94A3B8">'+w.job+' • '+w.dailyRate+' ج/يوم</div><div style="font-size:12px;color:#94A3B8">📱 '+w.phone+'</div></div><span style="color:'+(w.status==='نشط'?'#10B981':'#94A3B8')+'">'+w.status+'</span></div></div>'}).join('')||'<div class="card"><p style="color:#94A3B8;text-align:center">لا يوجد عمال</p></div>'}
function renderInventory(){return'<div class="stat" style="margin-bottom:12px"><div class="val">'+DATA.inventory.length+'</div><div class="lbl">أصناف في المخزن</div></div>'+DATA.inventory.map(function(item,i){return'<div class="card"><div style="display:flex;justify-content:space-between"><div><strong>'+item.name+'</strong><div style="font-size:12px;color:#94A3B8">'+item.quantity+' '+item.unit+'</div></div><button class="btn-sm btn-red" onclick="deleteItem(\'inventory\','+i+')">🗑️</button></div></div>'}).join('')||'<div class="card"><p style="color:#94A3B8;text-align:center">المخزن فارغ</p></div>'}
function showModal(title,body){document.getElementById('modalContent').innerHTML='<h3 style="margin-bottom:16px">'+title+'</h3>'+body+'<button class="btn btn-outline btn-block" onclick="closeModal()">إلغاء</button>';document.getElementById('modal').classList.remove('hidden')}
function closeModal(){document.getElementById('modal').classList.add('hidden')}
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal()})
</script>
</body>
</html>
