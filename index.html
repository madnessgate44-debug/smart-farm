<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المزرعة الذكية</title>
    <meta name="theme-color" content="#10B981">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',Tahoma,sans-serif;background:#1E293B;color:#F8FAFC;min-height:100vh}
        .header{background:linear-gradient(135deg,#10B981,#059669);padding:18px;text-align:center;color:#fff}
        .header h1{font-size:22px}.header p{font-size:13px;opacity:0.9}
        .tabs{display:flex;background:#0F172A;position:sticky;top:0;z-index:10;overflow-x:auto}
        .tabs button{flex:1;min-width:55px;padding:12px 4px;background:none;border:none;color:#94A3B8;font-size:9px;cursor:pointer;border-bottom:3px solid transparent;font-family:inherit;white-space:nowrap}
        .tabs button.active{color:#10B981;border-bottom-color:#10B981}
        .tabs button span{display:block;font-size:18px;margin-bottom:2px}
        main{padding:12px;padding-bottom:70px}
        .card{background:#0F172A;border-radius:12px;padding:14px;margin-bottom:10px;border:1px solid #1E293B}
        .card h2{font-size:15px;margin-bottom:8px}
        .grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
        .grid4{display:grid;grid-template-columns:1fr 1fr;gap:8px}
        .stat{background:#1E293B;border-radius:10px;padding:12px;text-align:center}
        .stat .val{font-size:18px;font-weight:bold}.stat .lbl{font-size:10px;color:#94A3B8}
        button{padding:10px 14px;border:none;border-radius:8px;font-size:13px;font-weight:bold;cursor:pointer;color:#fff;font-family:inherit}
        .btn-green{background:#10B981}.btn-gold{background:#F59E0B;color:#000}.btn-red{background:#EF4444}.btn-blue{background:#3B82F6}
        .btn-block{display:block;width:100%;padding:12px;margin:6px 0}
        .btn-sm{padding:6px 10px;font-size:11px;width:auto;display:inline-block}
        input,select,textarea{width:100%;padding:10px;background:#1E293B;border:1px solid #334155;border-radius:8px;color:#F8FAFC;font-size:14px;margin:4px 0;font-family:inherit}
        label{font-size:12px;color:#94A3B8;display:block;margin-top:8px}
        .tags{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0;max-height:150px;overflow-y:auto}
        .tag{padding:6px 12px;border-radius:20px;font-size:11px;cursor:pointer;border:1px solid #334155;background:#1E293B;color:#94A3B8}
        .tag.active{background:#10B981;color:#fff}
        .chat-msg{padding:10px 14px;border-radius:16px;margin:6px 0;max-width:85%;font-size:13px;line-height:1.5}
        .chat-user{background:#10B981;color:#fff;margin-right:auto;border-bottom-left-radius:4px}
        .chat-bot{background:#1E293B;border:1px solid #334155;margin-left:auto;border-bottom-right-radius:4px}
        .progress{height:8px;background:#1E293B;border-radius:4px;margin:6px 0;overflow:hidden}
        .progress div{height:100%;background:#10B981;border-radius:4px}
        .hidden{display:none!important}
        .fab{position:fixed;bottom:20px;right:16px;width:52px;height:52px;border-radius:50%;background:#10B981;border:none;color:#fff;font-size:26px;cursor:pointer;box-shadow:0 4px 16px rgba(16,185,129,0.4);z-index:100}
        .modal{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
        .modal>div{background:#0F172A;border-radius:16px;padding:20px;width:100%;max-width:400px;max-height:80vh;overflow-y:auto}
        .empty{text-align:center;padding:30px;color:#94A3B8}
    </style>
</head>
<body>
<div class="header"><h1>🌾 المزرعة الذكية</h1><p>للأستاذ أحمد باشا</p></div>
<div class="tabs" id="tabs">
    <button class="active" data-tab="home"><span>🏠</span>الرئيسية</button>
    <button data-tab="chat"><span>💬</span>بليغ</button>
    <button data-tab="tasks"><span>📋</span>المهام</button>
    <button data-tab="tables"><span>📊</span>الجداول</button>
    <button data-tab="finance"><span>💰</span>المالية</button>
    <button data-tab="workers"><span>👷</span>العمال</button>
    <button data-tab="inventory"><span>📦</span>المخازن</button>
</div>
<main id="main"></main>
<button class="fab hidden" id="fab" onclick="openAdd()">+</button>
<div class="modal hidden" id="modal"><div id="modalBox"></div></div>

<script>
var D={lands:[],crops:[],tasks:[],workers:[],purchases:[],sales:[],treasury:[],inventory_items:[],animals:[],equipment:[]};
var page='home',tbl='lands';
var chat=[{text:'الأستاذ أحمد يا باشا، مرحب بيك! 🌾\nالنظام شغال وجاهز.\nقولي إيه اللي حصل النهارده في المزرعة؟',user:false}];

(function(){
    var ks=Object.keys(D);
    for(var i=0;i<ks.length;i++){var k=ks[i];var d=localStorage.getItem('sf_'+k);if(d)try{D[k]=JSON.parse(d)}catch(e){}}
    document.getElementById('tabs').onclick=function(e){var b=e.target.closest('button');if(b)go(b.dataset.tab)};
    go('home');
})();

function save(k){localStorage.setItem('sf_'+k,JSON.stringify(D[k]))}

function go(p){
    page=p;
    var bs=document.querySelectorAll('#tabs button');for(var i=0;i<bs.length;i++)bs[i].classList.remove('active');
    var a=document.querySelector('[data-tab="'+p+'"]');if(a)a.classList.add('active');
    var m=document.getElementById('main'),f=document.getElementById('fab');f.classList.add('hidden');
    if(p==='home')m.innerHTML=homePage();
    else if(p==='chat')m.innerHTML=chatPage();
    else if(p==='tasks'){m.innerHTML=tasksPage();f.classList.remove('hidden')}
    else if(p==='tables'){m.innerHTML=tablesPage();f.classList.remove('hidden')}
    else if(p==='finance')m.innerHTML=financePage();
    else if(p==='workers'){m.innerHTML=workersPage();f.classList.remove('hidden')}
    else if(p==='inventory'){m.innerHTML=invPage();f.classList.remove('hidden')}
}

function homePage(){
    var r=0;for(var i=0;i<D.sales.length;i++)r+=Number(D.sales[i].totalRevenue||0);
    var e=0;for(var i=0;i<D.purchases.length;i++)e+=Number(D.purchases[i].totalCost||0);
    var c=0;for(var i=0;i<D.tasks.length;i++){if(D.tasks[i].status==='مكتمل')c++}
    return '<div class="card"><h2>📊 الإحصائيات</h2><div class="grid4">'+
        '<div class="stat"><div class="val" style="color:#3B82F6">'+D.tasks.length+'</div><div class="lbl">المهام</div></div>'+
        '<div class="stat"><div class="val" style="color:#10B981">'+c+'</div><div class="lbl">مكتملة</div></div>'+
        '<div class="stat"><div class="val" style="color:#F59E0B">'+D.workers.length+'</div><div class="lbl">عمال</div></div>'+
        '<div class="stat"><div class="val" style="color:#8B5CF6">'+D.lands.length+'</div><div class="lbl">أراضي</div></div>'+
        '</div></div>'+
        '<div class="card"><h2>💰 المالية</h2><div class="grid2">'+
        '<div class="stat"><div class="val" style="color:#10B981">'+r.toLocaleString()+'</div><div class="lbl">إيرادات</div></div>'+
        '<div class="stat"><div class="val" style="color:#EF4444">'+e.toLocaleString()+'</div><div class="lbl">مصروفات</div></div>'+
        '</div><div class="stat" style="margin-top:8px"><div class="val" style="font-size:22px;color:'+((r-e)>=0?'#10B981':'#EF4444')+'">'+(r-e).toLocaleString()+' ج</div><div class="lbl">الصافي</div></div></div>';
}

function chatPage(){
    var h='';for(var i=0;i<chat.length;i++)h+='<div class="chat-msg '+(chat[i].user?'chat-user':'chat-bot')+'">'+chat[i].text.replace(/\n/g,'<br>')+'</div>';
    return '<div style="height:calc(100vh - 200px);display:flex;flex-direction:column"><div style="flex:1;overflow-y:auto;padding:8px">'+h+'</div>'+
        '<div style="display:flex;gap:8px;padding:10px;background:#0F172A;border-radius:12px">'+
        '<button onclick="alert(\'🎤 جاري التسجيل...\')" style="background:#F59E0B;border:none;border-radius:50%;width:40px;height:40px;font-size:18px">🎤</button>'+
        '<input id="ci" placeholder="اكتب رسالة..." style="flex:1" onkeypress="if(event.key===\'Enter\')sendChat()">'+
        '<button onclick="sendChat()" style="background:#10B981;border:none;border-radius:8px;padding:8px 16px;color:#fff">إرسال</button></div></div>';
}

function sendChat(){
    var i=document.getElementById('ci');if(!i||!i.value.trim())return;
    chat.push({text:i.value,user:true});i.value='';
    setTimeout(function(){chat.push({text:'تمام يا باشا، تم ✓',user:false});go('chat')},800);
    go('chat');
}

function tasksPage(){
    var h='<div class="grid4">'+
        '<div class="stat"><div class="val">'+D.tasks.length+'</div><div class="lbl">إجمالي</div></div>'+
        '<div class="stat"><div class="val">'+D.tasks.filter(function(t){return t.status==='مكتمل'}).length+'</div><div class="lbl">✅ مكتملة</div></div>'+
        '<div class="stat"><div class="val">'+D.tasks.filter(function(t){return t.status==='جاري العمل'}).length+'</div><div class="lbl">⚡ جاري</div></div>'+
        '<div class="stat"><div class="val">'+D.tasks.filter(function(t){return t.status==='قيد الانتظار'}).length+'</div><div class="lbl">⏳ انتظار</div></div></div>';
    for(var i=0;i<D.tasks.length;i++){
        var t=D.tasks[i];
        h+='<div class="card"><div style="display:flex;justify-content:space-between"><strong>'+t.taskName+'</strong>'+
            '<span style="color:'+(t.status==='مكتمل'?'#10B981':t.status==='جاري العمل'?'#F59E0B':'#94A3B8')+'">'+t.status+'</span></div>'+
            '<div style="font-size:11px;color:#94A3B8;margin:4px 0">👷 '+(t.workerName||'---')+' • 🌾 '+(t.cropName||'---')+'</div>'+
            '<div class="progress"><div style="width:'+(t.progress||0)+'%"></div></div>'+
            '<div style="display:flex;gap:6px;margin-top:8px">'+
            '<button class="btn-sm btn-blue" onclick="updTask('+i+')">تحديث</button>'+
            '<button class="btn-sm btn-green" onclick="doneTask('+i+')">إكمال</button>'+
            '<button class="btn-sm btn-red" onclick="delTask('+i+')">🗑️</button></div></div>';
    }
    if(D.tasks.length===0)h+='<div class="card"><div class="empty"><p>لا توجد مهام</p></div></div>';
    return h;
}

function updTask(i){
    var t=D.tasks[i];
    document.getElementById('modalBox').innerHTML='<h3>'+t.taskName+'</h3>'+
        '<label>التقدم</label><input type="range" id="ps" min="0" max="100" value="'+(t.progress||0)+'" oninput="document.getElementById(\'pv\').textContent=this.value+\'%\'">'+
        '<p style="text-align:center;font-size:18px" id="pv">'+(t.progress||0)+'%</p>'+
        '<div class="tags">'+['قيد الانتظار','جاري العمل','مكتمل'].map(function(s){return'<span class="tag'+(t.status===s?' active':'')+'" onclick="D.tasks['+i+'].status=\''+s+'\';updTask('+i+')">'+s+'</span>'}).join('')+'</div>'+
        '<button class="btn btn-green btn-block" onclick="D.tasks['+i+'].progress=parseInt(document.getElementById(\'ps\').value);save(\'tasks\');closeModal();go(\'tasks\')">حفظ</button>';
    document.getElementById('modal').classList.remove('hidden');
}

function doneTask(i){D.tasks[i].status='مكتمل';D.tasks[i].progress=100;save('tasks');go('tasks')}
function delTask(i){if(confirm('حذف؟')){D.tasks.splice(i,1);save('tasks');go('tasks')}}

function tablesPage(){
    var ts=['lands','crops','workers','purchases','sales','treasury','inventory_items','animals','equipment'];
    var ls={lands:'أراضي',crops:'محاصيل',workers:'عمال',purchases:'مشتريات',sales:'مبيعات',treasury:'خزينة',inventory_items:'مخازن',animals:'حيوانات',equipment:'معدات'};
    var h='<div class="tags">';for(var i=0;i<ts.length;i++)h+='<span class="tag'+(tbl===ts[i]?' active':'')+'" onclick="tbl=\''+ts[i]+'\';go(\'tables\')">'+ls[ts[i]]+'</span>';h+='</div>';
    var d=D[tbl]||[];
    if(d.length===0)h+='<div class="card"><div class="empty"><p>لا توجد بيانات</p></div></div>';
    else for(var j=0;j<d.length;j++){var it=d[j],ks=Object.keys(it).slice(0,5);h+='<div class="card"><div style="display:flex;justify-content:space-between"><div>';for(var k=0;k<ks.length;k++)h+='<div style="font-size:12px;margin:2px 0"><span style="color:#94A3B8">'+ks[k]+':</span> '+it[ks[k]]+'</div>';h+='</div><button class="btn-sm btn-red" onclick="delRow(\''+tbl+'\','+j+')">🗑️</button></div></div>'}
    return h;
}

function delRow(t,i){if(confirm('حذف؟')){D[t].splice(i,1);save(t);go('tables')}}

function financePage(){
    var r=0;for(var i=0;i<D.sales.length;i++)r+=Number(D.sales[i].totalRevenue||0);
    var e=0;for(var i=0;i<D.purchases.length;i++)e+=Number(D.purchases[i].totalCost||0);
    return '<div class="grid2">'+
        '<div class="stat"><div class="val" style="color:#10B981">'+r.toLocaleString()+'</div><div class="lbl">المبيعات</div></div>'+
        '<div class="stat"><div class="val" style="color:#EF4444">'+e.toLocaleString()+'</div><div class="lbl">المشتريات</div></div></div>'+
        '<div class="card"><h2>📈 صافي الربح</h2><div class="stat"><div class="val" style="font-size:26px;color:'+((r-e)>=0?'#10B981':'#EF4444')+'">'+(r-e).toLocaleString()+' ج</div></div></div>';
}

function workersPage(){
    var h='<div class="stat" style="margin-bottom:8px"><div class="val">'+D.workers.length+'</div><div class="lbl">عمال</div></div>';
    for(var i=0;i<D.workers.length;i++){var w=D.workers[i];h+='<div class="card"><div><strong>'+w.name+'</strong><div style="font-size:11px;color:#94A3B8">'+w.job+' • '+w.dailyRate+' ج/يوم</div></div></div>'}
    if(D.workers.length===0)h+='<div class="card"><div class="empty"><p>لا يوجد عمال</p></div></div>';
    return h;
}

function invPage(){
    var h='';
    for(var i=0;i<D.inventory_items.length;i++){var it=D.inventory_items[i];h+='<div class="card"><div><strong>'+it.name+'</strong><div style="font-size:11px;color:#94A3B8">'+it.currentBalance+' '+it.unit+'</div></div></div>'}
    if(D.inventory_items.length===0)h='<div class="card"><div class="empty"><p>المخزن فارغ</p></div></div>';
    return h;
}

function openAdd(){
    if(page==='tasks'){
        document.getElementById('modalBox').innerHTML='<h3>إضافة مهمة</h3><label>العنوان</label><input id="a1"><label>العامل</label><input id="a2"><label>المحصول</label><input id="a3"><button class="btn btn-green btn-block" onclick="addTask()">حفظ</button>';
    }else if(page==='tables'){
        var fs={lands:'code,name,area',crops:'code,crop,season',workers:'code,name,job',purchases:'item,quantity,totalCost',sales:'item,quantity,totalRevenue',treasury:'amount,description',inventory_items:'name,currentBalance,unit',animals:'code,type,breed',equipment:'code,name,status'};
        var f=(fs[tbl]||'name').split(',');
        document.getElementById('modalBox').innerHTML='<h3>إضافة</h3>'+f.map(function(x){return'<label>'+x+'</label><input id="a_'+x+'">'}).join('')+'<button class="btn btn-green btn-block" onclick="addRow()">حفظ</button>';
    }else if(page==='workers'){
        document.getElementById('modalBox').innerHTML='<h3>إضافة عامل</h3><label>الاسم</label><input id="a1"><label>الوظيفة</label><input id="a2"><label>الأجر</label><input id="a3"><button class="btn btn-green btn-block" onclick="addWorker()">حفظ</button>';
    }else if(page==='inventory'){
        document.getElementById('modalBox').innerHTML='<h3>إضافة للمخزن</h3><label>الاسم</label><input id="a1"><label>الكمية</label><input id="a2"><label>الوحدة</label><input id="a3" value="كجم"><button class="btn btn-green btn-block" onclick="addInv()">حفظ</button>';
    }
    document.getElementById('modal').classList.remove('hidden');
}

function addTask(){
    D.tasks.push({taskName:document.getElementById('a1')?.value||'مهمة',workerName:document.getElementById('a2')?.value||'',cropName:document.getElementById('a3')?.value||'',status:'قيد الانتظار',progress:0,date:new Date().toISOString().split('T')[0]});
    save('tasks');closeModal();go('tasks');
}

function addRow(){
    var it={},inp=document.querySelectorAll('#modalBox input');for(var i=0;i<inp.length;i++){var id=inp[i].id.replace('a_','');if(id)it[id]=inp[i].value}
    it.date=new Date().toISOString().split('T')[0];D[tbl].push(it);save(tbl);closeModal();go('tables');
}

function addWorker(){
    D.workers.push({name:document.getElementById('a1')?.value||'',job:document.getElementById('a2')?.value||'',dailyRate:document.getElementById('a3')?.value||'0',status:'نشط'});
    save('workers');closeModal();go('workers');
}

function addInv(){
    D.inventory_items.push({name:document.getElementById('a1')?.value||'',currentBalance:document.getElementById('a2')?.value||'0',unit:document.getElementById('a3')?.value||'كجم'});
    save('inventory_items');closeModal();go('inventory');
}

function closeModal(){document.getElementById('modal').classList.add('hidden')}
document.getElementById('modal').onclick=function(e){if(e.target===this)closeModal()};
</script>
</body>
</html>
