<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المزرعة الذكية - الأستاذ أحمد باشا</title>
    <meta name="theme-color" content="#10B981">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',Tahoma,sans-serif;background:#1E293B;color:#F8FAFC;min-height:100vh}
        .header{background:linear-gradient(135deg,#10B981,#059669);padding:18px;text-align:center;color:#fff}
        .header h1{font-size:22px}.header p{font-size:13px;opacity:0.9}
        .tabs{display:flex;background:#0F172A;position:sticky;top:0;z-index:10;overflow-x:auto}
        .tabs button{flex:1;min-width:60px;padding:12px 6px;background:none;border:none;color:#94A3B8;font-size:10px;cursor:pointer;border-bottom:3px solid transparent;font-family:inherit}
        .tabs button.active{color:#10B981;border-bottom-color:#10B981}
        .tabs button span{display:block;font-size:20px;margin-bottom:3px}
        main{padding:12px;padding-bottom:70px}
        .card{background:#0F172A;border-radius:12px;padding:14px;margin-bottom:10px;border:1px solid #1E293B}
        .card h2{font-size:15px;margin-bottom:8px}
        .grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
        .grid4{display:grid;grid-template-columns:1fr 1fr;gap:8px}
        .stat{background:#1E293B;border-radius:10px;padding:12px;text-align:center}
        .stat .val{font-size:20px;font-weight:bold}.stat .lbl{font-size:10px;color:#94A3B8}
        button,.btn{padding:10px 16px;border:none;border-radius:8px;font-size:13px;font-weight:bold;cursor:pointer;color:#fff;font-family:inherit}
        .btn-green{background:#10B981}.btn-gold{background:#F59E0B;color:#000}.btn-red{background:#EF4444}
        .btn-outline{background:transparent;border:2px solid #10B981;color:#10B981}
        .btn-block{display:block;width:100%;padding:12px;margin:6px 0}
        .btn-sm{padding:6px 12px;font-size:11px;width:auto;display:inline-block}
        input,select,textarea{width:100%;padding:10px;background:#1E293B;border:1px solid #334155;border-radius:8px;color:#F8FAFC;font-size:14px;margin:4px 0;font-family:inherit}
        label{font-size:12px;color:#94A3B8;display:block;margin-top:8px}
        .tags{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0}
        .tag{padding:6px 14px;border-radius:20px;font-size:11px;cursor:pointer;border:1px solid #334155;background:#1E293B;color:#94A3B8}
        .tag.active{background:#10B981;color:#fff;border-color:#10B981}
        .chat-msg{padding:10px 14px;border-radius:16px;margin:6px 0;max-width:85%;font-size:13px;line-height:1.5}
        .chat-user{background:#10B981;color:#fff;margin-right:auto;border-bottom-left-radius:4px}
        .chat-bot{background:#1E293B;border:1px solid #334155;margin-left:auto;border-bottom-right-radius:4px}
        .progress{height:8px;background:#1E293B;border-radius:4px;margin:6px 0;overflow:hidden}
        .progress div{height:100%;background:#10B981;border-radius:4px}
        .hidden{display:none!important}
        .fab{position:fixed;bottom:20px;right:16px;width:52px;height:52px;border-radius:50%;background:#10B981;border:none;color:#fff;font-size:26px;cursor:pointer;box-shadow:0 4px 16px rgba(16,185,129,0.4);z-index:100}
        .modal{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
        .modal>div{background:#0F172A;border-radius:16px;padding:20px;width:100%;max-width:400px;max-height:80vh;overflow-y:auto}
        .empty{text-align:center;padding:30px;color:#94A3B8}
        .file-list{font-family:monospace;font-size:11px;max-height:300px;overflow-y:auto;background:#0a0a0a;border-radius:8px;padding:10px;margin:8px 0}
        .file-item{padding:5px 0;border-bottom:1px solid #1a1a2e;display:flex;justify-content:space-between;cursor:pointer}
        .file-item:hover{color:#10B981}
        .file-item .size{color:#94A3B8;font-size:10px}
        .alert{background:#FEF3C7;color:#92400E;padding:10px;border-radius:8px;margin:8px 0;font-size:12px}
        .alert-red{background:#FEE2E2;color:#DC2626}
        .loading{text-align:center;padding:40px;color:#94A3B8}
        .spinner{width:40px;height:40px;border:3px solid #334155;border-top-color:#10B981;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px}
        @keyframes spin{to{transform:rotate(360deg)}}
    </style>
</head>
<body>

<div class="header">
    <h1>🌾 المزرعة الذكية</h1>
    <p>للأستاذ أحمد باشا</p>
</div>

<div class="tabs" id="tabs">
    <button class="active" data-tab="dashboard"><span>🏠</span>الرئيسية</button>
    <button data-tab="chat"><span>💬</span>بليغ</button>
    <button data-tab="tasks"><span>📋</span>المهام</button>
    <button data-tab="tables"><span>📊</span>الجداول</button>
    <button data-tab="finance"><span>💰</span>المالية</button>
    <button data-tab="workers"><span>👷</span>العمال</button>
    <button data-tab="inventory"><span>📦</span>المخازن</button>
    <button data-tab="files"><span>📁</span>الملفات</button>
</div>

<main id="main"></main>
<button class="fab hidden" id="fab" onclick="handleFab()">+</button>
<div class="modal hidden" id="modal"><div id="modalContent"></div></div>

<script>
var DB = {
    lands:[],crops:[],tasks:[],workers:[],purchases:[],
    sales:[],treasury:[],inventory:[],animals:[],equipment:[],
    maintenance:[],waterLogs:[],meetings:[],contacts:[]
};

var currentTab = 'dashboard';
var currentTable = 'lands';
var repoFiles = [];
var chat = [
    {text:'الأستاذ أحمد يا باشا، مرحب بيك! 🌾\nالنظام شغال وجاهز.\nقولي إيه اللي حصل النهارده في المزرعة؟',user:false}
];

// ============ INIT ============
(function init(){
    loadLocalData();
    buildTabs();
    showTab('dashboard');
    fetchRepoFiles();
})();

function loadLocalData(){
    var keys = Object.keys(DB);
    for(var i=0;i<keys.length;i++){
        var k=keys[i];
        var d=localStorage.getItem('sf_'+k);
        if(d){try{DB[k]=JSON.parse(d)}catch(e){DB[k]=[]}}
    }
}

function save(k){localStorage.setItem('sf_'+k,JSON.stringify(DB[k]))}

// ============ FETCH REPO FILES ============
async function fetchRepoFiles(){
    try{
        var url='https://api.github.com/repos/madnessgate44-debug/smart-farm/git/trees/main?recursive=1';
        var resp=await fetch(url);
        if(resp.ok){
            var data=await resp.json();
            repoFiles=data.tree||[];
            console.log('Repo loaded:',repoFiles.length,'files');
        }
    }catch(e){
        console.log('Offline mode - using local data');
    }
}

// ============ TABS ============
function buildTabs(){
    document.getElementById('tabs').addEventListener('click',function(e){
        var btn=e.target.closest('button');
        if(!btn)return;
        var tab=btn.getAttribute('data-tab');
        if(tab)showTab(tab);
    });
}

function showTab(tab){
    currentTab=tab;
    var btns=document.querySelectorAll('#tabs button');
    for(var i=0;i<btns.length;i++)btns[i].classList.remove('active');
    var active=document.querySelector('[data-tab="'+tab+'"]');
    if(active)active.classList.add('active');
    
    var main=document.getElementById('main');
    var fab=document.getElementById('fab');
    fab.classList.add('hidden');
    
    if(tab==='dashboard')main.innerHTML=renderDashboard();
    else if(tab==='chat')main.innerHTML=renderChat();
    else if(tab==='tasks'){main.innerHTML=renderTasks();fab.classList.remove('hidden')}
    else if(tab==='tables'){main.innerHTML=renderTables();fab.classList.remove('hidden')}
    else if(tab==='finance')main.innerHTML=renderFinance();
    else if(tab==='workers'){main.innerHTML=renderWorkers();fab.classList.remove('hidden')}
    else if(tab==='inventory'){main.innerHTML=renderInventory();fab.classList.remove('hidden')}
    else if(tab==='files')main.innerHTML=renderFiles();
}

// ============ DASHBOARD ============
function renderDashboard(){
    var rev=0;for(var i=0;i<DB.sales.length;i++)rev+=Number(DB.sales[i].totalRevenue||0);
    var exp=0;for(var i=0;i<DB.purchases.length;i++)exp+=Number(DB.purchases[i].totalCost||0);
    var comp=0;for(var i=0;i<DB.tasks.length;i++){if(DB.tasks[i].status==='مكتمل')comp++}
    var net=rev-exp;
    
    return '<div class="card"><h2>📊 إحصائيات المزرعة</h2><div class="grid4">'+
        '<div class="stat"><div class="val" style="color:#3B82F6">'+DB.tasks.length+'</div><div class="lbl">المهام</div></div>'+
        '<div class="stat"><div class="val" style="color:#10B981">'+comp+'</div><div class="lbl">مكتملة</div></div>'+
        '<div class="stat"><div class="val" style="color:#F59E0B">'+DB.workers.length+'</div><div class="lbl">عمال</div></div>'+
        '<div class="stat"><div class="val" style="color:#8B5CF6">'+DB.lands.length+'</div><div class="lbl">أراضي</div></div>'+
        '</div></div>'+
        '<div class="card"><h2>💰 الملخص المالي</h2><div class="grid2">'+
        '<div class="stat"><div class="val" style="color:#10B981">'+rev.toLocaleString()+' ج</div><div class="lbl">الإيرادات</div></div>'+
        '<div class="stat"><div class="val" style="color:#EF4444">'+exp.toLocaleString()+' ج</div><div class="lbl">المصروفات</div></div>'+
        '</div><div class="stat" style="margin-top:8px"><div class="val" style="font-size:22px;color:'+(net>=0?'#10B981':'#EF4444')+'">'+net.toLocaleString()+' ج</div><div class="lbl">الصافي</div></div></div>'+
        '<div class="card"><h2>📁 ملفات المشروع على GitHub</h2><div class="stat"><div class="val">'+repoFiles.length+'</div><div class="lbl">ملف في المستودع</div></div><button class="btn btn-outline btn-block" onclick="showTab(\'files\')">📁 استعراض الملفات</button></div>';
}

// ============ CHAT ============
function renderChat(){
    var ms='';
    for(var i=0;i<chat.length;i++){
        ms+='<div class="chat-msg '+(chat[i].user?'chat-user':'chat-bot')+'">'+chat[i].text.replace(/\n/g,'<br>')+'</div>';
    }
    return '<div style="height:calc(100vh - 200px);display:flex;flex-direction:column">'+
        '<div style="flex:1;overflow-y:auto;padding:8px" id="chatBox">'+ms+'</div>'+
        '<div style="display:flex;gap:8px;padding:10px;background:#0F172A;border-radius:12px">'+
        '<button onclick="startVoice()" style="background:#F59E0B;border:none;border-radius:50%;width:40px;height:40px;cursor:pointer;font-size:18px;flex-shrink:0">🎤</button>'+
        '<input id="chatInput" placeholder="اكتب رسالة..." style="flex:1" onkeypress="if(event.key===\'Enter\')sendChat()">'+
        '<button onclick="sendChat()" style="background:#10B981;border:none;border-radius:8px;padding:8px 16px;color:#fff;cursor:pointer">إرسال</button>'+
        '</div></div>';
}

function sendChat(){
    var input=document.getElementById('chatInput');
    if(!input||!input.value.trim())return;
    chat.push({text:input.value,user:true});
    input.value='';
    setTimeout(function(){
        var r=['تمام يا باشا، تم التسجيل ✓','حاضر، هسجل البيانات فوراً 📝','أوكيه يا باشا، خلينا نشوف التفاصيل','ماشي يا باشا، تم. عايز حاجة تانية؟ 🌾'];
        chat.push({text:r[Math.floor(Math.random()*r.length)],user:false});
        showTab('chat');
    },800);
    showTab('chat');
}

function startVoice(){alert('🎙️ التسجيل الصوتي\n\nستعمل قريباً إن شاء الله')}

// ============ TASKS ============
function renderTasks(){
    var html='<div class="grid4">'+
        '<div class="stat"><div class="val">'+DB.tasks.length+'</div><div class="lbl">إجمالي</div></div>'+
        '<div class="stat"><div class="val">'+DB.tasks.filter(function(t){return t.status==='مكتمل'}).length+'</div><div class="lbl">✅ مكتملة</div></div>'+
        '<div class="stat"><div class="val">'+DB.tasks.filter(function(t){return t.status==='جاري العمل'}).length+'</div><div class="lbl">⚡ جاري</div></div>'+
        '<div class="stat"><div class="val">'+DB.tasks.filter(function(t){return t.status==='قيد الانتظار'}).length+'</div><div class="lbl">⏳ انتظار</div></div>'+
        '</div>';
    
    for(var i=0;i<DB.tasks.length;i++){
        var t=DB.tasks[i];
        html+='<div class="card"><div style="display:flex;justify-content:space-between;align-items:center"><strong>'+t.taskName+'</strong>'+
            '<span style="color:'+(t.status==='مكتمل'?'#10B981':t.status==='جاري العمل'?'#F59E0B':'#94A3B8')+'">'+t.status+'</span></div>'+
            '<div style="font-size:12px;color:#94A3B8;margin:4px 0">'+(t.workerName||'')+' • '+(t.cropName||'')+'</div>'+
            '<div class="progress"><div style="width:'+(t.progress||0)+'%"></div></div>'+
            '<div style="display:flex;gap:6px;margin-top:8px">'+
            '<button class="btn-sm btn-green" onclick="updateTask('+i+')">تحديث</button>'+
            '<button class="btn-sm btn-red" onclick="deleteTask('+i+')">🗑️</button></div></div>';
    }
    if(DB.tasks.length===0)html+='<div class="card"><div class="empty"><p>لا توجد مهام</p></div></div>';
    return html;
}

function updateTask(i){
    if(DB.tasks[i].status==='قيد الانتظار'){DB.tasks[i].status='جاري العمل';DB.tasks[i].progress=50}
    else if(DB.tasks[i].status==='جاري العمل'){DB.tasks[i].status='مكتمل';DB.tasks[i].progress=100}
    save('tasks');showTab('tasks');
}

function deleteTask(i){if(confirm('متأكد؟')){DB.tasks.splice(i,1);save('tasks');showTab('tasks')}}

// ============ TABLES ============
function renderTables(){
    var tables=['lands','crops','workers','purchases','sales','treasury','inventory','animals','equipment'];
    var labels={lands:'أراضي',crops:'محاصيل',workers:'عمال',purchases:'مشتريات',sales:'مبيعات',treasury:'خزينة',inventory:'مخزن',animals:'حيوانات',equipment:'معدات'};
    var html='<div class="tags">';
    for(var i=0;i<tables.length;i++){
        var t=tables[i];
        html+='<span class="tag'+(currentTable===t?' active':'')+'" onclick="switchTable(\''+t+'\')">'+labels[t]+'</span>';
    }
    html+='</div>';
    var data=DB[currentTable]||[];
    if(data.length===0){html+='<div class="card"><div class="empty"><p>لا توجد بيانات</p></div></div>'}
    else{
        for(var j=0;j<data.length;j++){
            var item=data[j];
            var keys=Object.keys(item).slice(0,5);
            html+='<div class="card"><div style="display:flex;justify-content:space-between"><div>';
            for(var k=0;k<keys.length;k++){html+='<div style="font-size:12px;margin:2px 0"><span style="color:#94A3B8">'+keys[k]+':</span> '+item[keys[k]]+'</div>'}
            html+='</div><button class="btn-sm btn-red" onclick="deleteItem(\''+currentTable+'\','+j+')">🗑️</button></div></div>';
        }
    }
    return html;
}

function switchTable(t){currentTable=t;showTab('tables')}
function deleteItem(t,i){if(confirm('متأكد؟')){DB[t].splice(i,1);save(t);showTab('tables')}}

// ============ FINANCE ============
function renderFinance(){
    var rev=0;for(var i=0;i<DB.sales.length;i++)rev+=Number(DB.sales[i].totalRevenue||0);
    var exp=0;for(var i=0;i<DB.purchases.length;i++)exp+=Number(DB.purchases[i].totalCost||0);
    var net=rev-exp;
    return '<div class="grid2">'+
        '<div class="stat"><div class="val" style="color:#10B981">'+rev.toLocaleString()+' ج</div><div class="lbl">المبيعات</div></div>'+
        '<div class="stat"><div class="val" style="color:#EF4444">'+exp.toLocaleString()+' ج</div><div class="lbl">المشتريات</div></div>'+
        '</div><div class="card"><h2>📈 صافي الربح</h2><div class="stat"><div class="val" style="font-size:26px;color:'+(net>=0?'#10B981':'#EF4444')+'">'+net.toLocaleString()+' ج</div></div></div>'+
        '<div class="card"><h2>📋 ملخص</h2>'+
        '<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #1E293B"><span>المبيعات</span><span>'+DB.sales.length+'</span></div>'+
        '<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #1E293B"><span>المشتريات</span><span>'+DB.purchases.length+'</span></div>'+
        '<div style="display:flex;justify-content:space-between;padding:8px 0"><span>الخزينة</span><span>'+DB.treasury.length+'</span></div></div>';
}

// ============ WORKERS ============
function renderWorkers(){
    var html='<div class="stat" style="margin-bottom:12px"><div class="val">'+DB.workers.length+'</div><div class="lbl">إجمالي العمال</div></div>';
    for(var i=0;i<DB.workers.length;i++){
        var w=DB.workers[i];
        html+='<div class="card"><div style="display:flex;justify-content:space-between"><div><strong>'+w.name+'</strong><div style="font-size:12px;color:#94A3B8">'+w.job+' • '+w.dailyRate+' ج/يوم</div><div style="font-size:12px;color:#94A3B8">📱 '+w.phone+'</div></div><span style="color:'+(w.status==='نشط'?'#10B981':'#94A3B8')+'">'+w.status+'</span></div></div>';
    }
    if(DB.workers.length===0)html+='<div class="card"><div class="empty"><p>لا يوجد عمال</p></div></div>';
    return html;
}

// ============ INVENTORY ============
function renderInventory(){
    var html='<div class="stat" style="margin-bottom:12px"><div class="val">'+DB.inventory.length+'</div><div class="lbl">أصناف في المخزن</div></div>';
    for(var i=0;i<DB.inventory.length;i++){
        var item=DB.inventory[i];
        html+='<div class="card"><div style="display:flex;justify-content:space-between"><div><strong>'+item.name+'</strong><div style="font-size:12px;color:#94A3B8">'+item.quantity+' '+item.unit+'</div></div><button class="btn-sm btn-red" onclick="deleteItem(\'inventory\','+i+')">🗑️</button></div></div>';
    }
    if(DB.inventory.length===0)html+='<div class="card"><div class="empty"><p>المخزن فارغ</p></div></div>';
    return html;
}

// ============ FILES (Repo Browser) ============
function renderFiles(){
    if(repoFiles.length===0)return '<div class="loading"><div class="spinner"></div><p>جاري تحميل الملفات من المستودع...</p></div>';
    
    var html='<div class="card"><h2>📁 ملفات المستودع</h2><div class="stat" style="margin-bottom:8px"><div class="val">'+repoFiles.length+'</div><div class="lbl">ملف في smart-farm</div></div>';
    html+='<div class="file-list">';
    for(var i=0;i<repoFiles.length;i++){
        var f=repoFiles[i];
        var icon=f.type==='tree'?'📁':'📄';
        var size=f.size?Math.round(f.size/1024)+' KB':'';
        html+='<div class="file-item"><span>'+icon+' '+f.path+'</span><span class="size">'+size+'</span></div>';
    }
    html+='</div></div>';
    return html;
}

// ============ FAB ============
function handleFab(){
    if(currentTab==='tasks'){
        showModal('إضافة مهمة','<label>العنوان</label><input id="f1"><label>العامل</label><input id="f2"><label>المحصول</label><input id="f3"><button class="btn btn-green btn-block" onclick="addTask()">حفظ</button>');
    }else if(currentTab==='tables'){
        var fields={lands:'code,name,area',crops:'code,crop,season',workers:'code,name,job',purchases:'item,quantity,totalCost',sales:'item,quantity,totalRevenue',treasury:'amount,description',inventory:'name,quantity,unit'};
        var f=(fields[currentTable]||'name').split(',');
        showModal('إضافة',''+f.map(function(x){return'<label>'+x+'</label><input id="f_'+x+'">'}).join('')+'<button class="btn btn-green btn-block" onclick="addTableItem()">حفظ</button>');
    }else if(currentTab==='workers'){
        showModal('إضافة عامل','<label>الاسم</label><input id="f1"><label>الوظيفة</label><input id="f2"><label>الأجر</label><input id="f3"><label>الهاتف</label><input id="f4"><button class="btn btn-green btn-block" onclick="addWorker()">حفظ</button>');
    }else if(currentTab==='inventory'){
        showModal('إضافة للمخزن','<label>الاسم</label><input id="f1"><label>الكمية</label><input id="f2"><label>الوحدة</label><input id="f3" value="كجم"><button class="btn btn-green btn-block" onclick="addInv()">حفظ</button>');
    }
}

function addTask(){
    DB.tasks.push({taskName:document.getElementById('f1')?.value||'مهمة',workerName:document.getElementById('f2')?.value||'',cropName:document.getElementById('f3')?.value||'',status:'قيد الانتظار',progress:0,date:new Date().toISOString().split('T')[0]});
    save('tasks');closeModal();showTab('tasks');
}

function addTableItem(){
    var item={};var inputs=document.querySelectorAll('#modalContent input');
    for(var i=0;i<inputs.length;i++){var id=inputs[i].id.replace('f_','');item[id]=inputs[i].value}
    item.date=new Date().toISOString().split('T')[0];
    DB[currentTable].push(item);save(currentTable);closeModal();showTab('tables');
}

function addWorker(){
    DB.workers.push({name:document.getElementById('f1')?.value||'',job:document.getElementById('f2')?.value||'',dailyRate:document.getElementById('f3')?.value||'0',phone:document.getElementById('f4')?.value||'',status:'نشط'});
    save('workers');closeModal();showTab('workers');
}

function addInv(){
    DB.inventory.push({name:document.getElementById('f1')?.value||'',quantity:document.getElementById('f2')?.value||'0',unit:document.getElementById('f3')?.value||'كجم'});
    save('inventory');closeModal();showTab('inventory');
}

// ============ MODAL ============
function showModal(title,body){
    document.getElementById('modalContent').innerHTML='<h3 style="margin-bottom:12px">'+title+'</h3>'+body+'<button class="btn btn-outline btn-block" onclick="closeModal()">إلغاء</button>';
    document.getElementById('modal').classList.remove('hidden');
}
function closeModal(){document.getElementById('modal').classList.add('hidden')}
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal()});
</script>
